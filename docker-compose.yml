services:
  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    networks:
      - cloud-network
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "8081:8080"
    environment:
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnection=Server=cloud-db;Database=CloudAppDb;User Id=sa;Password=StrongPassword123!;TrustServerCertificate=True
    networks:
      - cloud-network
    depends_on:
      - cloud-db

  cloud-db:
    image: mcr.microsoft.com/azure-sql-edge
    environment:
      SA_PASSWORD: "StrongPassword123!"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sql-data:/var/opt/mssql
    networks:
      - cloud-network

volumes:
  sql-data:

networks:
  cloud-network:
    driver: bridge